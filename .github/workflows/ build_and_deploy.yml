# This workflow will build a docker container, publish it to Google Container
# Registry, and deploy it to GKE when there is a push to the "development"
# branch.
#
# To configure this workflow:
#
# 1. Enable the following Google Cloud APIs:
#
#    - Artifact Registry (artifactregistry.googleapis.com)
#    - IAM Credentials API (iamcredentials.googleapis.com)
#
#    You can learn more about enabling APIs at
#    https://support.google.com/googleapi/answer/6158841.
#
#
# 2. Create and configure a Workload Identity Provider for GitHub:
#    https://github.com/google-github-actions/auth#preferred-direct-workload-identity-federation.
#
#    Depending on how you authenticate, you will need to grant an IAM principal
#    permissions on Google Cloud:
#    - In GCP, go to Workload Identity Federation & create a pool 
#    - Within the pool, create a provider for github
#    - Grant the Pool Artifact Registry Writer permissions (roles/artifactregistry.writer)
#      using this command in the Google Cloud CLI:
#   gcloud artifacts repositories add-iam-policy-binding linkedin-genai-gcr \
#   --project=linkedin-genai \
#   --location=europe-west2 \
#   --member="principalSet://iam.googleapis.com/projects/427938065788/locations/global/workloadIdentityPools/linkedin-genai-pool/attribute.repository/Ishangoai/linkedin_genai" \
#   --role="roles/artifactregistry.writer"
#    You can learn more about setting IAM permissions at
#    https://cloud.google.com/iam/docs/manage-access-other-resources
#
# 3. Verify on GCP that the service principle has the relevant permissions
#    - Go to Policy Analyser and click on clustom query
#    - Search for the principal: Artifact Registry Service Agent (service-427938065788@gcp-sa-artifactregistry.iam.gserviceaccount.com)
#    - click continue
#    - select both permissions
#    - click analyze
#
# 4. Add the following secrets to your repository's secrets configuration:
#
#    - GEMINI_API_KEY: The API key for the Gemini API.
#
# 5. Create a cloud run instance & a service account to manage the instance & Grant the workload Identity Pool the permission to impersonate the service account 
# $ gcloud iam service-accounts add-iam-policy-binding  linkedin-genai-service@linkedin-genai.iam.gserviceaccount.com \
# --member="principalSet://iam.googleapis.com/projects/427938065788/locations/global/workloadIdentityPools/linkedin-genai-pool/attribute.repository/Ishangoai/linkedin_genai" \
# --role="roles/iam.serviceAccountTokenCreator" \
# --project=linkedin-genai

name: 'Build and Deploy to Google Artifact Registry (GAR)'

on:
  push:
    branches:
      - 'development'

env:
  PROJECT_ID: '${{ secrets.GCP_PROJECT_NAME }}'
  GAR_LOCATION: 'europe-west2'
  CLOUD_RUN_REGION: 'europe-west2'
  REPOSITORY: '${{ secrets.GCP_PROJECT_NAME }}-gcr'
  WORKLOAD_IDENTITY_PROVIDER: 'projects/${{ secrets.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github/providers/github'
  DEPLOY_EXAMPLE: 'true' # <--- Toggle this to 'true' to deploy the example folder

jobs:
  setup-build-publish-deploy:
    name: 'Setup, Build, Publish, and Deploy'
    runs-on: 'ubuntu-latest'
    environment: 'production'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332' # actions/checkout@v4

      # Fetch the merged PR's author username using GitHub API
      - name: 'Get PR Author'
        id: get_pr_author
        run: |
          # Query the GitHub API to find the PR associated with the commit SHA
          PR_RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=closed&sort=updated&direction=desc")
          
          # Extract the PR author's username for the PR that matches the commit SHA
          PR_AUTHOR=$(echo "$PR_RESPONSE" | jq -r --arg sha "${{ github.sha }}" \
            '.[] | select(.merge_commit_sha == $sha) | .user.login')
          
          # Fallback to github.actor if no PR author is found
          if [ -z "$PR_AUTHOR" ]; then
            PR_AUTHOR="${{ github.actor }}"
          fi
          
          echo "PR_AUTHOR=$PR_AUTHOR" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Configure Workload Identity Federation and generate an access token.
      #
      # See https://github.com/google-github-actions/auth for more options,
      # including authenticating via a JSON credentials file.
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@f112390a2df9932162083945e46d439060d66ec2' # google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: 'tf-provision@${{ secrets.GCP_PROJECT_NAME }}.iam.gserviceaccount.com'

      # Authenticate Docker to Google Cloud Artifact Registry
      - name: 'Docker Auth'
        uses: 'docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567' # docker/login-action@v3
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.auth_token }}'
          registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

      - name: 'Debug Token and Account'
        run: |
          # Log the token (masked for security, truncated)
          echo "Access Token (first 10 chars): ${GITHUB_TOKEN:0:10}..."
          # Decode the JWT token to extract the email (requires jq)
          echo "${{ steps.auth.outputs.auth_token }}" | jq -R 'split(".") | .[1] | @base64d | fromjson | .email' || echo "Failed to decode token (install jq if needed)"
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.auth_token }}

      # Build the Docker image
      - name: 'Build Docker container'
        run: |-
          if [ "${{ env.DEPLOY_EXAMPLE }}" = "true" ] && { [ "$PR_AUTHOR" = "oliverangelil" ] || [ "$PR_AUTHOR" = "aduuna" ] || [ "$PR_AUTHOR" = "cyrille-feu" ]; }; then
            DEPLOYMENT_TARGET="ROOT"
            echo "CLOUD_RUN_SERVICE=${{ secrets.GCP_PROJECT_NAME }}-service" >> $GITHUB_ENV
            echo "IMAGE=${{ secrets.GCP_PROJECT_NAME }}-image" >> $GITHUB_ENV
            IMAGE=${{ secrets.GCP_PROJECT_NAME }}-image
          else
            DEPLOYMENT_TARGET="STUDENT"
            echo "CLOUD_RUN_SERVICE=${{ secrets.GCP_PROJECT_NAME }}-service-$(echo "$PR_AUTHOR" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
            echo "IMAGE=${{ secrets.GCP_PROJECT_NAME }}-image-$(echo "$PR_AUTHOR" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
            IMAGE="${{ secrets.GCP_PROJECT_NAME }}-image-$(echo "$PR_AUTHOR" | tr '[:upper:]' '[:lower:]')"
          fi
          echo "DEPLOYMENT_TARGET=$DEPLOYMENT_TARGET" >> $GITHUB_ENV
          DOCKER_TAG="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${GITHUB_SHA}"
          docker build \
            --build-arg DEPLOYMENT_TARGET=$DEPLOYMENT_TARGET \
            --build-arg GITHUB_USER="${{ env.PR_AUTHOR }}" \
            --tag "${DOCKER_TAG}" \
            --build-arg GITHUB_SHA="${GITHUB_SHA}" \
            --build-arg GITHUB_REF="${GITHUB_REF}" \
            .
      
      - name: 'Debug Docker Login'
        run: |
          cat ~/.docker/config.json
          # Test Docker auth by pulling an image (optional, requires an existing image)
          docker pull ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:test || echo "Pull failed (expected if no test image exists)"
          docker pull ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/test-image:latest || echo "Pull failed (expected if no manual push test image exists)"
          # Log the Docker tag for confirmation
          echo "Docker Tag: ${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${GITHUB_SHA}"

      - name: 'push Docker container'
        run: |-
          DOCKER_TAG="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${GITHUB_SHA}"
          docker push "${DOCKER_TAG}"

      - name: 'Deploy to Cloud Run'
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --set-env-vars GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }} \
            --set-env-vars GOOGLE_CSE_ID=${{ secrets.GOOGLE_CSE_ID }} \
            --set-env-vars SLACK_API_TOKEN=${{ secrets.SLACK_API_TOKEN }} \
            --set-env-vars GITHUB_USER=${{ env.PR_AUTHOR }} \
            --set-env-vars DEPLOYMENT_TARGET=${{ env.DEPLOYMENT_TARGET }} \
            --project ${{ env.PROJECT_ID }}

      # - name: 'Register Service in Google Service Directory'
      #   run: |
      #     # Get the Cloud Run service URL
      #     SERVICE_URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
      #       --region ${{ env.CLOUD_RUN_REGION }} \
      #       --platform managed \
      #       --format "value(status.url)")

      #     # Create or update the Service Directory namespace
      #     gcloud service-directory namespaces create deployed-services \
      #       --location ${{ env.CLOUD_RUN_REGION }} \
      #       --project ${{ env.PROJECT_ID }} || echo "Namespace already exists"

      #     # Create or update the Service Directory service
      #     gcloud service-directory services create ${{ env.CLOUD_RUN_SERVICE }} \
      #       --namespace deployed-services \
      #       --location ${{ env.CLOUD_RUN_REGION }} \
      #       --project ${{ env.PROJECT_ID }} || echo "Service already exists"

