name: Reveal Secret via Spaces
on: workflow_dispatch

jobs:
  reveal:
    runs-on: ubuntu-latest
    steps:
      - name: Print Secret with Spaces
        env:
          # REPLACE 'YOUR_SECRET_NAME' WITH YOUR ACTUAL SECRET NAME
          THE_SECRET: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "$THE_SECRET" | sed 's/./& /g'
