<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Compose</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h1 class="h4 mb-3">Compose an Essay</h1>
              <form id="composeForm" class="mb-3">
                <div class="mb-3">
                  <label for="topicInput" class="form-label">Topic</label>
                  <input id="topicInput" class="form-control" type="text" placeholder="Impact of AI on climate science" required />
                </div>
                <button id="composeBtn" class="btn btn-primary" type="submit">Compose</button>
              </form>

              <div id="alert" class="alert alert-danger d-none" role="alert"></div>

              <div id="results" class="d-none">
                <h2 class="h6">Outline</h2>
                <ol id="outlineList" class="mb-3"></ol>
                <h2 class="h6">Summary</h2>
                <pre id="summary" class="bg-light p-2 border rounded" style="white-space: pre-wrap;"></pre>
              </div>

              <p class="text-muted small mb-0">Endpoint: POST <code>/ai/compose</code></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const form = document.getElementById('composeForm');
        const topicInput = document.getElementById('topicInput');
        const btn = document.getElementById('composeBtn');
        const alertBox = document.getElementById('alert');
        const results = document.getElementById('results');
        const outlineList = document.getElementById('outlineList');
        const summary = document.getElementById('summary');

        function showError(msg) {
          alertBox.textContent = msg;
          alertBox.classList.remove('d-none');
        }

        function clearError() {
          alertBox.classList.add('d-none');
          alertBox.textContent = '';
        }

        function setLoading(loading) {
          btn.disabled = loading;
          btn.textContent = loading ? 'Composing…' : 'Compose';
        }

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          clearError();
          results.classList.add('d-none');
          outlineList.innerHTML = '';
          summary.textContent = '';

          const topic = topicInput.value.trim();
          if (!topic) { showError('Please enter a topic.'); return; }

          setLoading(true);
          try {
            const res = await fetch('/ai/compose?topic=' + encodeURIComponent(topic), { method: 'POST' });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || data.error) {
              const msg = data.error || ('Request failed with status ' + res.status);
              showError(msg);
              return;
            }

            if (Array.isArray(data.outline)) {
              outlineList.innerHTML = data.outline.map(s => '<li>' + String(s) + '</li>').join('');
            }
            summary.textContent = data.summary || '';
            results.classList.remove('d-none');
          } catch (err) {
            showError(String(err));
          } finally {
            setLoading(false);
          }
        });
      })();
    </script>
  </body>
</html>
