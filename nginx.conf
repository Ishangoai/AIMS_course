user nginx;
worker_processes auto;
# Send error logs to stderr and access logs to stdout so they appear in `docker logs`
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /dev/stdout main;

    upstream fastapi_upstream { server 127.0.0.1:8000; }
    upstream dagster_upstream { server 127.0.0.1:3000; }
    upstream mlflow_upstream { server 127.0.0.1:5000; }

    server {
        listen 8080;

        location /dagster/ {
            proxy_pass http://dagster_upstream/;
            proxy_set_header Host $host;
        }
        location = /dagster { return 301 /dagster/; }

        location /mlflow/ {
            proxy_pass http://mlflow_upstream/;
            proxy_set_header Host $host;
        }
        location = /mlflow { return 301 /mlflow/; }

        location / {
            proxy_pass http://fastapi_upstream;
            proxy_set_header Host $host;
        }
    }
}
