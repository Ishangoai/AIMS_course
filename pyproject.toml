[project]
name = "genai"
version = "0.1.0"
license = {file = "LICENSE"}
description = "GenAI LinkedIn Post Writer"
readme = "README.md"
requires-python = ">=3.12"

authors =  [
    {name = "Oliver Angelil", email = "oliver@ishango.ai"},
    {name = "Vincent Frimpong", email = "vincent@ishango.ai"}
]

dependencies = [
    "numpy>=2.2.2",
    "pyright>=1.1.393",
    "pytest>=7.4.3",
    "ruff>=0.9.5",
    "scipy>=1.15.1",
]

[project.urls]
Homepage = "https://ishango.ai/"

[project.optional-dependencies]
test = [
    "ruff>=0.9.5",
    "pytest>=7.4.3",
    "pytest-cov>=4.1.0",
]

[project.scripts]
genai = "genai.source:main"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

#[tool.setuptools.packages.find]
#where = ["."]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-vv -cov"

[tool.pyright]
pythonVersion = "3.12"
exclude = []
typeCheckingMode = "basic"
reportUntypedFunctionDecorator = false
reportMissingTypeStubs = false
colorOutput = true

[tool.ruff]
line-length = 98
select = ["E", "F", "W", "C90"]
ignore = ["E501"]

[tool.uv]
package = true
