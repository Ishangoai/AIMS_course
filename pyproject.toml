[project]
name = "AIMS_MLOps"
version = "0.1.0"
license = {file = "LICENSE"}
description = "MLOps Course for AIMS SA"
readme = "README.md"
requires-python = ">=3.13"

authors =  [
    {name = "Oliver Angelil"},
]

dependencies = [
]

[project.optional-dependencies]
test = [
    "flake8==6.1.0",
    "mypy==1.6.1",
    "pandas-stubs==2.1.1.230928",
    "pytest==7.4.3",
    "pytest-cov==4.1.0",
    "isort==5.12.0",
    "pandas==2.1.3",
    "pyarrow==14.0.1",
    "matplotlib==3.9.2"
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-vv -cov"

[tool.mypy]
python_version = "3.13"
exclude = ["sandbox", "datascience"]
check_untyped_defs = false
explicit_package_bases = true
color_output = true

[[tool.mypy.overrides]]
module = []
ignore_missing_imports = true

[tool.isort]
skip = ["sandbox", "datascience"]
line_length = 98
